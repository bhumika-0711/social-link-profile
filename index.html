<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Jessica Randall — Front-end developer social links profile">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <title>Jessica Randall | Social Links</title>
</head>
<body>
  <main class="page">
  <!-- Profile card: centered container for all profile content -->
  <article class="profile-card">
    <header class="profile-card__header">
      <img
        class="profile-card__avatar"
        src="./assets/images/avatar-jessica.jpeg"
        alt="Portrait of Jessica Randall"
        width="88"
        height="88"
      >
      <h1 class="profile-card__name">Jessica Randall</h1>
      <p class="profile-card__location">London, United Kingdom</p>
      <blockquote class="profile-card__bio">
        <p>&ldquo;Front-end developer and avid reader.&rdquo;</p>
      </blockquote>
    </header>

    <!-- Social links as a vertical list of buttons -->
    <nav class="profile-card__links" aria-label="Social media links">
      <ul class="link-list">
        <li class="link-list__item">
          <a class="link-list__button" href="https://github.com/" target="_blank" rel="noopener noreferrer">GitHub</a>
        </li>
        <li class="link-list__item">
          <a class="link-list__button" href="https://www.frontendmentor.io/" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>
        </li>
        <li class="link-list__item">
          <a class="link-list__button" href="https://www.linkedin.com/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </li>
        <li class="link-list__item">
          <a class="link-list__button" href="https://twitter.com/" target="_blank" rel="noopener noreferrer">Twitter</a>
        </li>
        <li class="link-list__item">
          <a class="link-list__button" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">Instagram</a>
        </li>
      </ul>
    </nav>
  </article>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
